name: Build and Publish Dev Images

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dev-composefs-rs

jobs:
  # Build per-arch on native runners, push by digest
  build:
    name: Build ${{ matrix.distro }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: centos-stream10
            base_image: quay.io/centos-bootc/centos-bootc:stream10
            arch: amd64
            runner: ubuntu-24.04
          - distro: centos-stream10
            base_image: quay.io/centos-bootc/centos-bootc:stream10
            arch: arm64
            runner: ubuntu-24.04-arm
          - distro: debian
            base_image: ghcr.io/bootcrew/debian-bootc:latest
            arch: amd64
            runner: ubuntu-24.04
          - distro: debian
            base_image: ghcr.io/bootcrew/debian-bootc:latest
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      - name: Build dev container image
        run: |
          podman build \
            -f ci/Containerfile.dev \
            --build-arg base_image=${{ matrix.base_image }} \
            --tag localhost/dev-composefs-rs:latest \
            .

      - name: Log in to container registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u ${{ github.actor }} --password-stdin ${{ env.REGISTRY }}

      - name: Push by digest
        id: push
        run: |
          digest=$(podman push --digestfile /tmp/digest \
            localhost/dev-composefs-rs:latest \
            ${{ env.IMAGE_NAME }}:${{ matrix.distro }} && cat /tmp/digest)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.distro }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Create multi-arch manifests, one per distro
  manifest:
    name: Manifest ${{ matrix.distro }}
    runs-on: ubuntu-24.04
    needs: build
    strategy:
      fail-fast: false
      matrix:
        distro: [centos-stream10, debian]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.distro }}-*
          merge-multiple: true

      - name: Log in to container registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u ${{ github.actor }} --password-stdin ${{ env.REGISTRY }}

      - name: Create and push manifest
        run: |
          tag="${{ env.IMAGE_NAME }}:${{ matrix.distro }}"
          digests=$(cd /tmp/digests && printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)
          podman manifest create "${tag}" ${digests}
          podman manifest push "${tag}" "${tag}"

      - name: Inspect manifest
        run: podman manifest inspect ${{ env.IMAGE_NAME }}:${{ matrix.distro }}
