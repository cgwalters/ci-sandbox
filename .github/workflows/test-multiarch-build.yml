# Test workflow for build-push-image + create-manifest actions
name: Test multiarch container build

on:
  push:
    branches: [test-multiarch-build]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}/test-multiarch

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: bootc-dev/actions/bootc-ubuntu-setup@main

      - uses: ./build-push-image
        with:
          image: ${{ env.IMAGE }}
          arch: ${{ matrix.arch }}
          containerfile: ./Containerfile.test
          context: .

  manifest:
    name: Create manifest
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: bootc-dev/actions/bootc-ubuntu-setup@main

      - name: Extract metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Generate a throwaway cosign keypair for testing the signing path.
      # Real consumers would use a secret stored in repo settings.
      - uses: sigstore/cosign-installer@v3
      - name: Generate test cosign keypair
        shell: bash
        run: |
          set -euo pipefail
          COSIGN_PASSWORD="" cosign generate-key-pair
          # Multiline secret needs to go through a file-based env approach
          {
            echo "COSIGN_TEST_KEY<<COSIGN_EOF"
            cat cosign.key
            echo "COSIGN_EOF"
          } >> "$GITHUB_ENV"

      - uses: ./create-manifest
        with:
          image: ${{ env.IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          cosign-key: ${{ env.COSIGN_TEST_KEY }}
