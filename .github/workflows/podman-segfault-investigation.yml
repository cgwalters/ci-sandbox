name: Investigate podman segfault

# Reproduces the podman segfault seen in devaipod CI:
#   https://github.com/cgwalters/devaipod/actions/runs/24162742432/job/70657203104
# The crash was: Segmentation fault (core dumped) podman system service --time=120
# This workflow instruments podman to capture diagnostics.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  podman-stress:
    name: Podman concurrent stress test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup host (newer podman, just)
        uses: bootc-dev/actions/bootc-ubuntu-setup@main

      - name: Stop Docker (tests use podman)
        run: sudo systemctl stop docker.socket docker.service && sudo rm -f /run/docker.sock

      # ── Baseline diagnostics ──────────────────────────────────────
      - name: Collect baseline environment
        run: |
          set -x
          echo "=== Podman version ==="
          podman version
          echo "=== Podman info ==="
          podman info
          echo "=== crun version ==="
          crun --version || true
          echo "=== Kernel version ==="
          uname -a
          echo "=== cgroup setup ==="
          cat /proc/self/cgroup
          mount | grep cgroup
          echo "=== Open file descriptors (init) ==="
          ls /proc/self/fd | wc -l
          echo "=== Memory ==="
          free -m
          echo "=== ulimits ==="
          ulimit -a
          echo "=== Core dump settings ==="
          cat /proc/sys/kernel/core_pattern
          ulimit -c
          echo "=== /etc/containers/ ==="
          ls -la /etc/containers/ || true
          cat /etc/containers/registries.conf 2>/dev/null | head -20 || true
          cat /etc/containers/storage.conf 2>/dev/null | head -30 || true
          cat /etc/containers/containers.conf 2>/dev/null | head -30 || true

      # ── Enable coredumps ──────────────────────────────────────────
      - name: Configure coredump capture
        run: |
          # Enable unlimited core dumps
          ulimit -c unlimited
          # Use systemd-coredump if available, otherwise /tmp
          if command -v coredumpctl &>/dev/null; then
            echo "systemd-coredump available"
            sudo sysctl -w kernel.core_pattern='|/usr/lib/systemd/systemd-coredump %P %u %g %s %t %c %h'
          else
            sudo sysctl -w kernel.core_pattern='/tmp/core.%e.%p.%t'
          fi
          cat /proc/sys/kernel/core_pattern

      - name: Pull test image
        run: podman pull docker.io/library/alpine:latest

      # ── Start podman service (mimics devaipod CI) ─────────────────
      - name: Start instrumented podman service
        id: podman-service
        run: |
          set -euo pipefail
          SOCKET="/tmp/podman-stress-test/podman.sock"
          mkdir -p "$(dirname "$SOCKET")"

          echo "=== Starting podman system service ==="
          # Start with SIGABRT-on-segfault via LD_PRELOAD trick? No, just monitor.
          podman system service --time=0 "unix://$SOCKET" &
          PODMAN_PID=$!
          echo "podman_pid=$PODMAN_PID" >> "$GITHUB_OUTPUT"
          echo "socket=$SOCKET" >> "$GITHUB_OUTPUT"

          # Wait for socket
          for i in $(seq 1 50); do [ -S "$SOCKET" ] && break; sleep 0.1; done
          if [ ! -S "$SOCKET" ]; then
            echo "FATAL: podman socket never appeared"
            exit 1
          fi
          echo "Podman service started, PID=$PODMAN_PID, socket=$SOCKET"

          # Verify it responds
          curl --unix-socket "$SOCKET" http://d/v5.0.0/libpod/_ping
          echo ""

      # ── Background monitor ────────────────────────────────────────
      - name: Start podman health monitor
        run: |
          PODMAN_PID="${{ steps.podman-service.outputs.podman_pid }}"
          SOCKET="${{ steps.podman-service.outputs.socket }}"
          cat > /tmp/monitor-podman.sh << 'MONITOR'
          #!/bin/bash
          set -u
          PODMAN_PID="$1"
          SOCKET="$2"
          LOGFILE="/tmp/podman-monitor.log"
          echo "=== Monitoring podman PID=$PODMAN_PID ===" | tee "$LOGFILE"
          iteration=0
          while true; do
            iteration=$((iteration + 1))
            ts=$(date +%H:%M:%S.%N)

            # Check if process is still alive
            if ! kill -0 "$PODMAN_PID" 2>/dev/null; then
              echo "$ts PODMAN PROCESS DIED (PID=$PODMAN_PID)" | tee -a "$LOGFILE"
              # Check for coredump
              if command -v coredumpctl &>/dev/null; then
                echo "$ts Checking coredumpctl..." | tee -a "$LOGFILE"
                coredumpctl list 2>&1 | tee -a "$LOGFILE"
                coredumpctl info "$PODMAN_PID" 2>&1 | tee -a "$LOGFILE" || true
              fi
              ls -la /tmp/core.* 2>/dev/null | tee -a "$LOGFILE" || true
              # Check exit status
              wait "$PODMAN_PID" 2>/dev/null
              echo "$ts Exit status: $?" | tee -a "$LOGFILE"
              break
            fi

            # Every 5 iterations, log resource usage
            if [ $((iteration % 5)) -eq 0 ]; then
              {
                echo "$ts iter=$iteration podman_alive=true"
                echo "$ts   /proc/$PODMAN_PID/status:"
                grep -E 'VmRSS|VmSize|Threads|FDSize' "/proc/$PODMAN_PID/status" 2>/dev/null || echo "  (process gone)"
                echo "$ts   fd_count=$(ls /proc/$PODMAN_PID/fd 2>/dev/null | wc -l)"
                echo "$ts   socket_ping=$(curl -s --max-time 2 --unix-socket "$SOCKET" http://d/v5.0.0/libpod/_ping 2>&1)"
                echo "$ts   containers=$(curl -s --max-time 2 --unix-socket "$SOCKET" 'http://d/v5.0.0/libpod/containers/json?all=true' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d))' 2>/dev/null || echo 'err')"
              } | tee -a "$LOGFILE"
            fi
            sleep 1
          done
          echo "$ts === Monitor exiting ===" | tee -a "$LOGFILE"
          MONITOR
          chmod +x /tmp/monitor-podman.sh
          nohup /tmp/monitor-podman.sh "$PODMAN_PID" "$SOCKET" &
          echo "Monitor started in background"

      # ── Stress test: concurrent container operations ──────────────
      - name: "Stress test: concurrent container lifecycle"
        run: |
          set -euo pipefail
          SOCKET="${{ steps.podman-service.outputs.socket }}"
          export DOCKER_HOST="unix://$SOCKET"

          echo "=== Phase 1: Sequential warm-up (5 containers) ==="
          for i in $(seq 1 5); do
            name="warmup-$i"
            podman run --rm --name "$name" alpine echo "warmup $i" || echo "FAILED: $name"
          done
          echo "Sequential warm-up done"

          echo ""
          echo "=== Phase 2: Concurrent create+start (20 containers, 4 at a time) ==="
          # This mimics what devaipod integration tests do: many pods created concurrently
          pids=()
          for batch in $(seq 1 5); do
            for j in $(seq 1 4); do
              i=$(( (batch-1)*4 + j ))
              (
                name="stress-$i"
                # Create a pod (like devaipod does)
                podman pod create --name "pod-$name" 2>&1 || echo "FAILED pod create: $name"
                # Run container in the pod
                podman run -d --pod "pod-$name" --name "$name" alpine sleep 30 2>&1 || echo "FAILED run: $name"
                # Immediately inspect
                podman pod inspect "pod-$name" >/dev/null 2>&1 || echo "FAILED inspect: $name"
              ) &
              pids+=($!)
            done
            # Wait for this batch
            for pid in "${pids[@]}"; do
              wait "$pid" || true
            done
            pids=()
            echo "Batch $batch done"
          done

          echo ""
          echo "=== Phase 3: Concurrent stop+remove ==="
          podman pod ls --format '{{.Name}}' | while read pod; do
            podman pod rm -f "$pod" &
          done
          wait
          echo "Cleanup done"

          echo ""
          echo "=== Phase 4: Rapid create/destroy cycles (50 iterations) ==="
          for i in $(seq 1 50); do
            (
              name="rapid-$i"
              podman pod create --name "pod-$name" 2>/dev/null
              podman run --rm --pod "pod-$name" --name "$name" alpine echo "rapid $i" 2>/dev/null
              podman pod rm -f "pod-$name" 2>/dev/null
            ) &
            # Run 10 at a time
            if [ $((i % 10)) -eq 0 ]; then
              wait
              echo "Rapid batch $i done"
            fi
          done
          wait
          echo "Rapid cycles done"

          echo ""
          echo "=== Phase 5: Heavy pod + nested container operations ==="
          # This more closely mimics devaipod: pod with infra + app container + exec
          pids=()
          for i in $(seq 1 15); do
            (
              name="heavy-$i"
              podman pod create --name "pod-$name" --publish "0:8080" 2>&1 || { echo "FAILED pod create: $name"; exit 1; }
              podman run -d --pod "pod-$name" --name "${name}-app" alpine sh -c 'sleep 60' 2>&1 || { echo "FAILED run app: $name"; exit 1; }
              podman run -d --pod "pod-$name" --name "${name}-sidecar" alpine sh -c 'sleep 60' 2>&1 || { echo "FAILED run sidecar: $name"; exit 1; }
              # Exec into container (like devaipod does for agent commands)
              podman exec "${name}-app" echo "exec in $name" 2>&1 || echo "WARN: exec failed for $name"
              # Inspect published ports
              podman pod inspect "pod-$name" --format '{{.InfraContainerId}}' 2>&1 || echo "WARN: inspect failed for $name"
              podman port "pod-$name" 2>&1 || echo "WARN: port query failed for $name"
            ) &
            pids+=($!)
            if [ $((i % 5)) -eq 0 ]; then
              for pid in "${pids[@]}"; do wait "$pid" || true; done
              pids=()
              echo "Heavy batch $(( i / 5 )) done"
            fi
          done
          for pid in "${pids[@]}"; do wait "$pid" || true; done

          echo ""
          echo "=== Phase 6: Concurrent cleanup of all pods ==="
          podman pod ls --format '{{.Name}}' | xargs -P4 -I{} podman pod rm -f {} 2>&1 || true
          echo "All pods cleaned up"

      - name: Check podman service health after stress
        if: always()
        run: |
          PODMAN_PID="${{ steps.podman-service.outputs.podman_pid }}"
          SOCKET="${{ steps.podman-service.outputs.socket }}"

          echo "=== Podman process status ==="
          if kill -0 "$PODMAN_PID" 2>/dev/null; then
            echo "ALIVE (PID=$PODMAN_PID)"
            grep -E 'VmRSS|VmSize|Threads|FDSize|State' "/proc/$PODMAN_PID/status" || true
            echo "fd_count=$(ls /proc/$PODMAN_PID/fd 2>/dev/null | wc -l)"
          else
            echo "DEAD (PID=$PODMAN_PID)"
            echo "=== This is the segfault we're looking for! ==="
          fi

          echo ""
          echo "=== Socket ping ==="
          curl -s --max-time 5 --unix-socket "$SOCKET" http://d/v5.0.0/libpod/_ping 2>&1 || echo "SOCKET UNREACHABLE"

          echo ""
          echo "=== Monitor log ==="
          cat /tmp/podman-monitor.log 2>/dev/null || echo "(no monitor log)"

          echo ""
          echo "=== dmesg (last 50 lines, looking for segfault/oom) ==="
          sudo dmesg | tail -50 || true

          echo ""
          echo "=== Coredumps ==="
          if command -v coredumpctl &>/dev/null; then
            coredumpctl list 2>&1 || true
          fi
          ls -la /tmp/core.* 2>/dev/null || echo "No core files in /tmp"

          echo ""
          echo "=== journalctl podman (last 100 lines) ==="
          journalctl --user -u 'podman*' --no-pager -n 100 2>&1 || true

      # ── Second round: nested container stress (mimics devaipod CI) ─
      # devaipod's CI runs integration tests inside a container that
      # talks back to the host podman via a mounted socket. This nesting
      # may be the key trigger for the segfault.
      - name: "Nested container stress test (mimics devaipod CI)"
        run: |
          set -euo pipefail
          PODMAN_PID="${{ steps.podman-service.outputs.podman_pid }}"
          SOCKET="${{ steps.podman-service.outputs.socket }}"

          # Restart podman service fresh for this round
          kill "$PODMAN_PID" 2>/dev/null || true
          sleep 1

          SOCKET="/tmp/podman-nested-test/podman.sock"
          mkdir -p "$(dirname "$SOCKET")"
          podman system service --time=0 "unix://$SOCKET" &
          PODMAN_PID=$!
          for i in $(seq 1 50); do [ -S "$SOCKET" ] && break; sleep 0.1; done
          echo "Fresh podman service PID=$PODMAN_PID"

          # Start monitor
          nohup /tmp/monitor-podman.sh "$PODMAN_PID" "$SOCKET" &

          # Run a container that hammers the host podman socket from inside
          # This is the exact pattern devaipod CI uses:
          #   outer container → mounts host podman socket → runs podman-remote → creates pods
          podman run --rm --privileged --pids-limit=-1 \
            -v "$SOCKET":/run/docker.sock \
            -v /tmp:/tmp \
            docker.io/library/alpine:latest sh -c '
              apk add --no-cache curl jq bash >/dev/null 2>&1
              SOCK=/run/docker.sock
              echo "=== Nested container: hammering host podman socket ==="

              # Verify connectivity
              curl -s --unix-socket $SOCK http://d/v5.0.0/libpod/_ping
              echo ""

              # Phase A: Concurrent pod create from inside container (20 pods)
              echo "Phase A: Creating 20 pods concurrently from inside container..."
              for i in $(seq 1 20); do
                (
                  # Create pod via API
                  curl -s --unix-socket $SOCK -X POST \
                    "http://d/v5.0.0/libpod/pods/create" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\": \"nested-pod-$i\"}" || echo "FAIL create nested-pod-$i"
                  # Start pod
                  curl -s --unix-socket $SOCK -X POST \
                    "http://d/v5.0.0/libpod/pods/nested-pod-$i/start" || echo "FAIL start nested-pod-$i"
                  # Create container in pod via API
                  curl -s --unix-socket $SOCK -X POST \
                    "http://d/v5.0.0/libpod/containers/create" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\": \"nested-ctr-$i\", \"image\": \"docker.io/library/alpine:latest\", \"pod\": \"nested-pod-$i\", \"command\": [\"sleep\", \"30\"]}" || echo "FAIL create ctr $i"
                  # Start container
                  CID=$(curl -s --unix-socket $SOCK "http://d/v5.0.0/libpod/containers/nested-ctr-$i/json" 2>/dev/null | jq -r .Id 2>/dev/null || echo "")
                  if [ -n "$CID" ] && [ "$CID" != "null" ]; then
                    curl -s --unix-socket $SOCK -X POST \
                      "http://d/v5.0.0/libpod/containers/$CID/start" || echo "FAIL start ctr $i"
                  fi
                ) &
                # 5 at a time
                if [ $((i % 5)) -eq 0 ]; then wait; echo "  batch $((i/5)) done"; fi
              done
              wait
              echo "Phase A done"

              # Phase B: Concurrent inspections + event stream
              echo "Phase B: Concurrent inspect/list operations..."
              for i in $(seq 1 30); do
                (
                  curl -s --unix-socket $SOCK "http://d/v5.0.0/libpod/pods/json" >/dev/null 2>&1
                  curl -s --unix-socket $SOCK "http://d/v5.0.0/libpod/containers/json?all=true" >/dev/null 2>&1
                ) &
              done
              wait
              echo "Phase B done"

              # Phase C: Concurrent pod removal
              echo "Phase C: Removing all pods concurrently..."
              for i in $(seq 1 20); do
                curl -s --unix-socket $SOCK -X DELETE \
                  "http://d/v5.0.0/libpod/pods/nested-pod-$i?force=true" &
              done
              wait
              echo "Phase C done"

              # Final check
              echo "Final ping:"
              curl -s --unix-socket $SOCK http://d/v5.0.0/libpod/_ping
              echo ""
            ' || echo "*** Nested container exited with error (podman may have crashed) ***"

          echo ""
          echo "=== Post-nested-test podman status ==="
          if kill -0 "$PODMAN_PID" 2>/dev/null; then
            echo "Podman ALIVE after nested stress test"
          else
            echo "*** PODMAN CRASHED during nested stress test ***"
            sudo dmesg | grep -i segfault | tail -5 || true
          fi

      - name: Collect final diagnostics
        if: always()
        run: |
          echo "=== Final monitor log ==="
          cat /tmp/podman-monitor.log 2>/dev/null || echo "(none)"

          echo ""
          echo "=== dmesg (segfault/oom related) ==="
          sudo dmesg | grep -iE 'segfault|oom|killed|traps|panic' || echo "No crashes in dmesg"

          echo ""
          echo "=== Coredumps ==="
          if command -v coredumpctl &>/dev/null; then
            coredumpctl list 2>&1 || echo "No coredumps"
            # Try to get backtrace if there's a crash
            coredumpctl info 2>&1 | head -50 || true
          fi
          ls -la /tmp/core.* 2>/dev/null || echo "No core files"

          echo ""
          echo "=== All podman-related processes ==="
          ps aux | grep -E 'podman|conmon|crun' || true
